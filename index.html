<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>James Daily Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif; 
      background: #1a1a2e; 
      color: #fff; 
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 500px; margin: 0 auto; }
    .header { margin-bottom: 24px; }
    .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .date { color: #8b8b9e; font-size: 14px; }
    .card { 
      background: #252542; 
      border-radius: 16px; 
      padding: 20px; 
      margin-bottom: 16px;
    }
    .card-title { 
      font-size: 13px; 
      color: #8b8b9e; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .stock-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #353550; }
    .stock-row:last-child { border-bottom: none; }
    .stock-name { font-size: 15px; font-weight: 600; }
    .stock-price { font-size: 15px; font-weight: 600; }
    .stock-change { font-size: 13px; padding: 4px 10px; border-radius: 8px; }
    .up { background: rgba(52, 168, 83, 0.2); color: #34a853; }
    .down { background: rgba(234, 67, 53, 0.2); color: #ea4335; }
    .tag { display: inline-block; background: #3d3d6b; color: #a5a5e0; padding: 6px 12px; border-radius: 12px; font-size: 13px; margin-right: 8px; margin-bottom: 8px; }
    .info-row { padding: 8px 0; color: #ccc; font-size: 14px; }
    .footer { text-align: center; color: #666; margin-top: 40px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>James Daily Report</h1>
      <p class="date">Sunday, March 29, 2026</p>
    </div>

    <div class="card">
      <div class="card-title">持股</div>
      <div class="stock-row">
        <span class="stock-name">2308 台達電</span>
        <div>
          <span class="stock-price">1,510</span>
          <span class="stock-change up">+0.33%</span>
        </div>
      </div>
      <div class="stock-row">
        <span class="stock-name">2408 南亞科</span>
        <div>
          <span class="stock-price">219.5</span>
          <span class="stock-change down">-2.66%</span>
        </div>
      </div>
      <div class="stock-row">
        <span class="stock-name">BTC 比特幣</span>
        <div>
          <span class="stock-price">$66,700</span>
          <span class="stock-change down">-2.3%</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">AI 散熱趨勢</div>
      <p><span class="tag">液冷主流</span> 2026年液冷滲透率達57%</p>
      <p><span class="tag">NVIDIA</span> Vera Rubin 支援全液冷</p>
      <p><span class="tag">台廠受惠</span> 台達電、奇鋐、富世達</p>
    </div>

    <div class="card">
      <div class="card-title">Gmail</div>
      <div class="info-row">• Google 安全性快訊</div>
      <div class="info-row">• MEGA 升級通知</div>
      <div class="info-row">• OpenAI API 更新</div>
    </div>

    <div class="card">
      <div class="card-title">Calendar</div>
      <div class="info-row">今日無行程</div>
    </div>

    <div class="footer">
      🤖 by Jarvis
    </div>
  </div>
</body>
</html>
