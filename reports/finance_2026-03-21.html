<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>James 財務儀表板</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background:#0b0c10;color:#c5c6d0;font-family:Inter,sans-serif;padding:20px;">
  <div style="max-width:500px;margin:0 auto;">
    <h1 style="color:white;font-size:24px;margin-bottom:20px;">💰 個人財務儀表板</h1>
    
    <div style="background:linear-gradient(145deg,#1f1f2e,#16161f);border:1px solid #2d2d3a;border-radius:16px;padding:24px;margin-bottom:20px;border-left:4px solid #10b981;">
      <p style="color:#10b981;font-size:14px;">淨資產</p>
      <p style="color:white;font-size:36px;font-weight:bold;">4,137,500 TWD</p>
      <p style="color:#6b7280;font-size:14px;">目標進度 4.14%</p>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
      <div style="background:#1f1f2e;border:1px solid #2d2d3a;border-radius:12px;padding:16px;text-align:center;">
        <p style="color:#6b7280;font-size:12px;">總資產</p>
        <p style="color:#10b981;font-size:24px;font-weight:bold;">6,637,500</p>
      </div>
      <div style="background:#1f1f2e;border:1px solid #2d2d3a;border-radius:12px;padding:16px;text-align:center;">
        <p style="color:#6b7280;font-size:12px;">總負債</p>
        <p style="color:#ef4444;font-size:24px;font-weight:bold;">2,500,000</p>
      </div>
    </div>

    <div style="background:#1f1f2e;border:1px solid #2d2d3a;border-radius:12px;padding:16px;margin-bottom:20px;">
      <p style="color:#6b7280;font-size:14px;margin-bottom:12px;">主要資產</p>
      <div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;font-size:14px;"><span>台達電 (4500股@1475)</span><span style="color:white;">6,637,500</span></div></div>
    </div>

    <div style="background:#1f1f2e;border:1px solid #2d2d3a;border-radius:12px;padding:16px;margin-bottom:20px;">
      <p style="color:#6b7280;font-size:14px;margin-bottom:12px;">市場資料</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
        <span>USD/TWD: 32.13</span>
        <span>BTC: $71,500</span>
        <span>台達電: 1,475</span>
      </div>
    </div>

    <p style="color:#6b7280;font-size:12px;text-align:center;">更新日期: 2026-03-21</p>
  </div>
</body>
</html>
